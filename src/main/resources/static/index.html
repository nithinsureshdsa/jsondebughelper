<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>JSON Debug Helper</title>
    <style>
        /* ── Reset & Base ─────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
          --bg:       #0f1117;
          --surface:  #1a1d27;
          --border:   #2e3146;
          --accent:   #6c63ff;
          --accent2:  #00d4aa;
          --danger:   #ff5c5c;
          --warn:     #ffbb33;
          --text:     #e2e4f0;
          --muted:    #7b7f9e;
          --green:    #4ade80;
          --font-mono: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
        }

        body {
          background: var(--bg);
          color: var(--text);
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
          font-size: 14px;
          min-height: 100vh;
        }

        /* ── Header ───────────────────────────────────────────── */
        header {
          background: var(--surface);
          border-bottom: 1px solid var(--border);
          padding: 14px 24px;
          display: flex;
          align-items: center;
          gap: 12px;
        }
        header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
        header h1 span { color: var(--accent); }
        .badge {
          background: var(--accent);
          color: #fff;
          font-size: 10px;
          font-weight: 700;
          padding: 2px 7px;
          border-radius: 99px;
          letter-spacing: 0.5px;
        }

        /* ── Tab bar ──────────────────────────────────────────── */
        .tabs {
          display: flex;
          gap: 4px;
          padding: 12px 24px 0;
          border-bottom: 1px solid var(--border);
          background: var(--surface);
        }
        .tab {
          padding: 8px 18px;
          border: none;
          background: transparent;
          color: var(--muted);
          font-size: 13px;
          font-weight: 600;
          cursor: pointer;
          border-bottom: 2px solid transparent;
          transition: color .15s, border-color .15s;
          margin-bottom: -1px;
        }
        .tab:hover { color: var(--text); }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

        /* ── Main layout ──────────────────────────────────────── */
        main { padding: 20px 24px; max-width: 1400px; margin: 0 auto; }

        .panel { display: none; }
        .panel.active { display: block; }

        .grid-2 {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 16px;
        }
        .grid-1 { display: grid; grid-template-columns: 1fr; gap: 16px; }

        /* ── Card ─────────────────────────────────────────────── */
        .card {
          background: var(--surface);
          border: 1px solid var(--border);
          border-radius: 10px;
          overflow: hidden;
        }
        .card-header {
          padding: 10px 14px;
          border-bottom: 1px solid var(--border);
          display: flex;
          align-items: center;
          justify-content: space-between;
          font-size: 12px;
          font-weight: 600;
          color: var(--muted);
          text-transform: uppercase;
          letter-spacing: 0.6px;
        }
        .card-header .actions { display: flex; gap: 6px; }

        /* ── Textarea ─────────────────────────────────────────── */
        textarea {
          width: 100%;
          min-height: 340px;
          background: transparent;
          border: none;
          outline: none;
          resize: vertical;
          padding: 14px;
          font-family: var(--font-mono);
          font-size: 13px;
          line-height: 1.6;
          color: var(--text);
        }
        textarea::placeholder { color: var(--muted); }
        textarea[readonly] { cursor: default; }

        /* ── Toolbar ──────────────────────────────────────────── */
        .toolbar {
          display: flex;
          align-items: center;
          gap: 10px;
          padding: 14px 0;
          flex-wrap: wrap;
        }

        /* ── Buttons ──────────────────────────────────────────── */
        .btn {
          padding: 8px 18px;
          border: none;
          border-radius: 7px;
          font-size: 13px;
          font-weight: 600;
          cursor: pointer;
          transition: opacity .15s, transform .1s;
          display: inline-flex;
          align-items: center;
          gap: 6px;
        }
        .btn:active { transform: scale(.97); }
        .btn:disabled { opacity: .45; cursor: not-allowed; }
        .btn-primary  { background: var(--accent);  color: #fff; }
        .btn-success  { background: var(--accent2); color: #111; }
        .btn-danger   { background: var(--danger);  color: #fff; }
        .btn-ghost    {
          background: transparent;
          color: var(--muted);
          border: 1px solid var(--border);
        }
        .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

        /* ── Input ────────────────────────────────────────────── */
        .input-row { display: flex; gap: 8px; align-items: center; }
        input[type="text"] {
          flex: 1;
          background: var(--bg);
          border: 1px solid var(--border);
          border-radius: 7px;
          padding: 8px 12px;
          color: var(--text);
          font-family: var(--font-mono);
          font-size: 13px;
          outline: none;
        }
        input[type="text"]:focus { border-color: var(--accent); }
        input[type="text"]::placeholder { color: var(--muted); }

        label { font-size: 12px; color: var(--muted); font-weight: 600; }

        /* ── Toggle ───────────────────────────────────────────── */
        .toggle-row { display: flex; gap: 4px; }
        .toggle-btn {
          padding: 6px 14px;
          border: 1px solid var(--border);
          border-radius: 6px;
          background: transparent;
          color: var(--muted);
          font-size: 12px;
          font-weight: 600;
          cursor: pointer;
        }
        .toggle-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        /* ── Status / spinner ─────────────────────────────────── */
        .status {
          font-size: 12px;
          padding: 6px 12px;
          border-radius: 6px;
          display: none;
        }
        .status.error   { display:block; background:#ff5c5c22; color:var(--danger); border:1px solid #ff5c5c44; }
        .status.success { display:block; background:#00d4aa22; color:var(--accent2); border:1px solid #00d4aa44; }
        .status.info    { display:block; background:#6c63ff22; color:var(--accent);  border:1px solid #6c63ff44; }
        .spinner { display:none; width:16px; height:16px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* ── Diff output ──────────────────────────────────────── */
        .diff-table {
          width: 100%;
          border-collapse: collapse;
          font-family: var(--font-mono);
          font-size: 12px;
        }
        .diff-table th {
          background: var(--bg);
          padding: 8px 12px;
          text-align: left;
          color: var(--muted);
          font-weight: 600;
          text-transform: uppercase;
          font-size: 11px;
          letter-spacing: 0.5px;
          border-bottom: 1px solid var(--border);
        }
        .diff-table td {
          padding: 8px 12px;
          border-bottom: 1px solid var(--border);
          vertical-align: top;
          word-break: break-all;
        }
        .diff-table tr:last-child td { border-bottom: none; }
        .diff-table td:first-child { color: var(--accent); }
        .val-left  { color: var(--danger); }
        .val-right { color: var(--green); }
        .val-null  { color: var(--muted); font-style: italic; }

        /* ── Matches list ─────────────────────────────────────── */
        .match-item {
          padding: 8px 14px;
          border-bottom: 1px solid var(--border);
          display: flex;
          gap: 12px;
          font-family: var(--font-mono);
          font-size: 12px;
        }
        .match-item:last-child { border-bottom: none; }
        .match-path { color: var(--accent); min-width: 200px; word-break: break-all; }
        .match-val  { color: var(--accent2); word-break: break-all; }

        /* ── Array → Table ────────────────────────────────────── */
        .array-table {
          width: 100%;
          border-collapse: collapse;
          font-family: var(--font-mono);
          font-size: 12px;
        }
        .array-table th {
          background: var(--bg);
          padding: 8px 12px;
          text-align: left;
          color: var(--muted);
          font-weight: 600;
          text-transform: uppercase;
          font-size: 11px;
          letter-spacing: 0.5px;
          border-bottom: 1px solid var(--border);
          white-space: nowrap;
        }
        .array-table td {
          padding: 7px 12px;
          border-bottom: 1px solid var(--border);
          word-break: break-word;
        }
        .array-table tr:nth-child(even) td { background: rgba(255,255,255,.02); }
        .array-table td:first-child { color: var(--muted); }

        /* ── Scrollable result box ────────────────────────────── */
        .result-box {
          overflow: auto;
          max-height: 480px;
        }

        /* ── Empty state ──────────────────────────────────────── */
        .empty {
          padding: 48px;
          text-align: center;
          color: var(--muted);
          font-size: 13px;
        }
        .empty .icon { font-size: 32px; margin-bottom: 8px; }

        /* ── Copy button ──────────────────────────────────────── */
        .btn-copy {
          padding: 4px 10px;
          font-size: 11px;
          background: var(--bg);
          color: var(--muted);
          border: 1px solid var(--border);
          border-radius: 5px;
          cursor: pointer;
        }
        .btn-copy:hover { color: var(--text); }

        /* ── Responsive ───────────────────────────────────────── */
        @media (max-width: 768px) {
          .grid-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>JSON <span>Debug</span> Helper</h1>
    <span class="badge">MVP</span>
</header>

<!-- ── Tabs ─────────────────────────────────────────────── -->
<div class="tabs">
    <button class="tab active" onclick="switchTab('format')">⚡ Format</button>
    <button class="tab" onclick="switchTab('compare')">⚖️ Compare</button>
    <button class="tab" onclick="switchTab('search')">🔍 Search</button>
    <button class="tab" onclick="switchTab('extract')">📌 Extract</button>
    <button class="tab" onclick="switchTab('table')">📊 Array → Table</button>
</div>

<main>

    <!-- ══════════════════════════════════════════════════════
         TAB 1 — FORMAT
    ═══════════════════════════════════════════════════════ -->
    <div id="tab-format" class="panel active">
        <div class="toolbar">
            <div class="toggle-row">
                <button class="toggle-btn active" id="btn-pretty" onclick="setMode('pretty')">Pretty</button>
                <button class="toggle-btn" id="btn-minify" onclick="setMode('minify')">Minify</button>
            </div>
            <button class="btn btn-primary" onclick="doFormat()">
                <span>Format</span>
                <div class="spinner" id="fmt-spin"></div>
            </button>
            <button class="btn btn-ghost" onclick="clearPanel('format')">Clear</button>
            <div class="status" id="fmt-status"></div>
        </div>

        <div class="grid-2">
            <div class="card">
                <div class="card-header">Input JSON</div>
                <textarea id="fmt-input" placeholder='Paste your JSON here…&#10;&#10;{"name":"Alice","age":30}'></textarea>
            </div>
            <div class="card">
                <div class="card-header">
                    Output
                    <button class="btn-copy" onclick="copyText('fmt-output')">Copy</button>
                </div>
                <textarea id="fmt-output" readonly placeholder="Formatted output will appear here…"></textarea>
            </div>
        </div>
    </div>

    <!-- ══════════════════════════════════════════════════════
         TAB 2 — COMPARE
    ═══════════════════════════════════════════════════════ -->
    <div id="tab-compare" class="panel">
        <div class="toolbar">
            <button class="btn btn-primary" onclick="doCompare()">
                <span>Compare</span>
                <div class="spinner" id="cmp-spin"></div>
            </button>
            <button class="btn btn-ghost" onclick="clearPanel('compare')">Clear</button>
            <div class="status" id="cmp-status"></div>
        </div>

        <div class="grid-2">
            <div class="card">
                <div class="card-header">JSON 1 (Left)</div>
                <textarea id="cmp-left" placeholder='{"name":"Alice","role":"admin"}'></textarea>
            </div>
            <div class="card">
                <div class="card-header">JSON 2 (Right)</div>
                <textarea id="cmp-right" placeholder='{"name":"Bob","role":"user"}'></textarea>
            </div>
        </div>

        <div style="margin-top:16px;">
            <div class="card">
                <div class="card-header">Differences</div>
                <div class="result-box" id="cmp-result">
                    <div class="empty"><div class="icon">⚖️</div>Paste two JSON objects and click Compare</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ══════════════════════════════════════════════════════
         TAB 3 — SEARCH
    ═══════════════════════════════════════════════════════ -->
    <div id="tab-search" class="panel">
        <div class="toolbar">
            <div class="input-row" style="flex:1">
                <label>Query:</label>
                <input type="text" id="search-query" placeholder='e.g. "alice" or "email"' />
            </div>
            <button class="btn btn-primary" onclick="doSearch()">
                <span>Search</span>
                <div class="spinner" id="srch-spin"></div>
            </button>
            <button class="btn btn-ghost" onclick="clearPanel('search')">Clear</button>
            <div class="status" id="srch-status"></div>
        </div>

        <div class="grid-2">
            <div class="card">
                <div class="card-header">JSON Input</div>
                <textarea id="srch-input" placeholder='Paste any JSON to search through…'></textarea>
            </div>
            <div class="card">
                <div class="card-header">Matches</div>
                <div class="result-box" id="srch-result">
                    <div class="empty"><div class="icon">🔍</div>Results will appear here</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ══════════════════════════════════════════════════════
         TAB 4 — EXTRACT (JSONPath)
    ═══════════════════════════════════════════════════════ -->
    <div id="tab-extract" class="panel">
        <div class="toolbar">
            <div class="input-row" style="flex:1">
                <label>JSONPath:</label>
                <input type="text" id="extract-path" placeholder='e.g. $.users[*].name  or  $.store.book[0]' />
            </div>
            <button class="btn btn-success" onclick="doExtract()">
                <span>Extract</span>
                <div class="spinner" id="ext-spin"></div>
            </button>
            <button class="btn btn-ghost" onclick="clearPanel('extract')">Clear</button>
            <div class="status" id="ext-status"></div>
        </div>

        <div class="grid-2">
            <div class="card">
                <div class="card-header">JSON Input</div>
                <textarea id="ext-input" placeholder='Paste JSON here…'></textarea>
            </div>
            <div class="card">
                <div class="card-header">
                    Extracted Result
                    <button class="btn-copy" onclick="copyText('ext-output')">Copy</button>
                </div>
                <textarea id="ext-output" readonly placeholder="Extracted values will appear here…"></textarea>
            </div>
        </div>
    </div>

    <!-- ══════════════════════════════════════════════════════
         TAB 5 — ARRAY → TABLE
    ═══════════════════════════════════════════════════════ -->
    <div id="tab-table" class="panel">
        <div class="toolbar">
            <button class="btn btn-success" onclick="doTable()">
                <span>Convert to Table</span>
            </button>
            <button class="btn btn-ghost" onclick="clearPanel('table')">Clear</button>
            <button class="btn btn-ghost" onclick="exportTableCSV()">⬇ Export CSV</button>
            <div class="status" id="tbl-status"></div>
        </div>

        <div class="grid-2">
            <div class="card">
                <div class="card-header">JSON Array Input</div>
                <textarea id="tbl-input" placeholder='Paste a JSON array here…&#10;&#10;[&#10;  {"id":1,"name":"Alice","role":"admin"},&#10;  {"id":2,"name":"Bob","role":"user"}&#10;]'></textarea>
            </div>
            <div class="card" style="overflow:hidden">
                <div class="card-header">Table View</div>
                <div class="result-box" id="tbl-result">
                    <div class="empty"><div class="icon">📊</div>Paste a JSON array and click Convert</div>
                </div>
            </div>
        </div>
    </div>

</main>

<script>
    const API = 'http://localhost:8080/api/json';
    let formatMode = 'pretty';
    let lastTableData = null; // for CSV export

    // ── Tab switching ────────────────────────────────────────
    function switchTab(name) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('tab-' + name).classList.add('active');
    }

    function setMode(mode) {
      formatMode = mode;
      document.getElementById('btn-pretty').classList.toggle('active', mode === 'pretty');
      document.getElementById('btn-minify').classList.toggle('active', mode === 'minify');
    }

    // ── Utility helpers ─────────────────────────────────────
    function showStatus(id, msg, type) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.className = 'status ' + type;
    }
    function hideStatus(id) {
      document.getElementById(id).className = 'status';
    }
    function spin(id, on) {
      document.getElementById(id).style.display = on ? 'block' : 'none';
    }
    function copyText(id) {
      const el = document.getElementById(id);
      navigator.clipboard.writeText(el.value).then(() => {
        showStatus('fmt-status', '✓ Copied!', 'success');
        setTimeout(() => hideStatus('fmt-status'), 1500);
      });
    }
    function parseJsonOrError(text, statusId) {
      try { return JSON.parse(text); }
      catch(e) {
        showStatus(statusId, '✗ Invalid JSON: ' + e.message, 'error');
        return null;
      }
    }

    // ── API call wrapper ────────────────────────────────────
    async function callApi(endpoint, body) {
      const res = await fetch(API + endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || data.error || 'Request failed');
      return data;
    }

    // ── Clear panel ──────────────────────────────────────────
    function clearPanel(name) {
      const ids = {
        format:  ['fmt-input','fmt-output'],
        compare: ['cmp-left','cmp-right'],
        search:  ['srch-input','search-query'],
        extract: ['ext-input','ext-output','extract-path'],
        table:   ['tbl-input']
      };
      (ids[name] || []).forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });
      const results = { compare:'cmp-result', search:'srch-result', table:'tbl-result' };
      if (results[name]) {
        const icons = { compare:'⚖️', search:'🔍', table:'📊' };
        const msgs  = {
          compare: 'Paste two JSON objects and click Compare',
          search:  'Results will appear here',
          table:   'Paste a JSON array and click Convert'
        };
        document.getElementById(results[name]).innerHTML =
          `<div class="empty"><div class="icon">${icons[name]}</div>${msgs[name]}</div>`;
      }
    }

    // ════════════════════════════════════════════════════════
    // FEATURE 1 — FORMAT
    // ════════════════════════════════════════════════════════
    async function doFormat() {
      const input = document.getElementById('fmt-input').value.trim();
      if (!input) { showStatus('fmt-status','Enter JSON to format','error'); return; }
      hideStatus('fmt-status');
      spin('fmt-spin', true);
      try {
        const data = await callApi('/format', { input, pretty: formatMode === 'pretty' });
        document.getElementById('fmt-output').value = data.output;
        showStatus('fmt-status', '✓ Formatted successfully', 'success');
      } catch(e) {
        showStatus('fmt-status', '✗ ' + e.message, 'error');
      } finally { spin('fmt-spin', false); }
    }

    // ════════════════════════════════════════════════════════
    // FEATURE 2 — COMPARE
    // ════════════════════════════════════════════════════════
    async function doCompare() {
      const left  = document.getElementById('cmp-left').value.trim();
      const right = document.getElementById('cmp-right').value.trim();
      if (!left || !right) { showStatus('cmp-status','Both JSON inputs are required','error'); return; }

      // Validate JSON client-side first for a fast error
      try { JSON.parse(left); } catch(e) { showStatus('cmp-status','✗ JSON 1 is invalid: ' + e.message,'error'); return; }
      try { JSON.parse(right); } catch(e) { showStatus('cmp-status','✗ JSON 2 is invalid: ' + e.message,'error'); return; }

      hideStatus('cmp-status');
      spin('cmp-spin', true);
      try {
        const data = await callApi('/compare', { json1: left, json2: right });
        renderDiff(data.differences);
        if (data.differences.length === 0)
          showStatus('cmp-status', '✓ JSONs are identical!', 'success');
        else
          showStatus('cmp-status', `Found ${data.differences.length} difference(s)`, 'info');
      } catch(e) {
        showStatus('cmp-status', '✗ ' + e.message, 'error');
      } finally { spin('cmp-spin', false); }
    }

    function renderDiff(diffs) {
      const box = document.getElementById('cmp-result');
      if (!diffs || diffs.length === 0) {
        box.innerHTML = `<div class="empty"><div class="icon">✅</div>No differences found — JSONs are identical!</div>`;
        return;
      }
      const rows = diffs.map(d => `
        <tr>
          <td>${escHtml(d.path)}</td>
          <td class="${d.value1 == null ? 'val-null' : 'val-left'}">${d.value1 == null ? '(missing)' : escHtml(String(d.value1))}</td>
          <td class="${d.value2 == null ? 'val-null' : 'val-right'}">${d.value2 == null ? '(missing)' : escHtml(String(d.value2))}</td>
        </tr>`).join('');
      box.innerHTML = `
        <table class="diff-table">
          <thead><tr><th>Path</th><th>JSON 1</th><th>JSON 2</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    // ════════════════════════════════════════════════════════
    // FEATURE 3 — SEARCH
    // ════════════════════════════════════════════════════════
    async function doSearch() {
      const raw   = document.getElementById('srch-input').value.trim();
      const query = document.getElementById('search-query').value.trim();
      if (!raw)   { showStatus('srch-status','Enter JSON input','error'); return; }
      if (!query) { showStatus('srch-status','Enter a search query','error'); return; }

      try { JSON.parse(raw); } catch(e) { showStatus('srch-status','✗ Invalid JSON: ' + e.message,'error'); return; }

      hideStatus('srch-status');
      spin('srch-spin', true);
      try {
        // Send json as a string — backend parses it
        const data = await callApi('/search', { json: raw, query });
        renderMatches(data.matches);
        showStatus('srch-status', `Found ${data.matches.length} match(es)`, data.matches.length ? 'success' : 'info');
      } catch(e) {
        showStatus('srch-status', '✗ ' + e.message, 'error');
      } finally { spin('srch-spin', false); }
    }

    function renderMatches(matches) {
      const box = document.getElementById('srch-result');
      if (!matches || matches.length === 0) {
        box.innerHTML = `<div class="empty"><div class="icon">🔍</div>No matches found</div>`;
        return;
      }
      box.innerHTML = matches.map(m => `
        <div class="match-item">
          <span class="match-path">${escHtml(m.path)}</span>
          <span class="match-val">${escHtml(String(m.value))}</span>
        </div>`).join('');
    }

    // ════════════════════════════════════════════════════════
    // FEATURE 4 — EXTRACT (JSONPath)
    // ════════════════════════════════════════════════════════
    async function doExtract() {
      const raw  = document.getElementById('ext-input').value.trim();
      const path = document.getElementById('extract-path').value.trim();
      if (!raw)  { showStatus('ext-status','Enter JSON input','error'); return; }
      if (!path) { showStatus('ext-status','Enter a JSONPath expression','error'); return; }

      try { JSON.parse(raw); } catch(e) { showStatus('ext-status','✗ Invalid JSON: ' + e.message,'error'); return; }

      hideStatus('ext-status');
      spin('ext-spin', true);
      try {
        // Send json as a string — backend parses it
        const data = await callApi('/extract', { json: raw, path });
        document.getElementById('ext-output').value = JSON.stringify(data.result, null, 2);
        showStatus('ext-status', `✓ Extracted ${data.result.length} item(s)`, 'success');
      } catch(e) {
        showStatus('ext-status', '✗ ' + e.message, 'error');
      } finally { spin('ext-spin', false); }
    }

    // ════════════════════════════════════════════════════════
    // FEATURE 5 — ARRAY → TABLE (client-side, no API needed)
    // ════════════════════════════════════════════════════════
    function doTable() {
      const raw = document.getElementById('tbl-input').value.trim();
      if (!raw) { showStatus('tbl-status','Enter a JSON array','error'); return; }

      let data;
      try { data = JSON.parse(raw); }
      catch(e) { showStatus('tbl-status','✗ Invalid JSON: ' + e.message,'error'); return; }

      if (!Array.isArray(data)) {
        showStatus('tbl-status','✗ Input must be a JSON array (starts with [)','error');
        return;
      }
      if (data.length === 0) {
        showStatus('tbl-status','Array is empty','info');
        return;
      }

      // Collect all unique keys across all objects (handles sparse arrays)
      const allKeys = [...new Set(data.flatMap(row =>
        typeof row === 'object' && row !== null ? Object.keys(row) : []
      ))];

      if (allKeys.length === 0) {
        // Primitive array — render as a single column
        renderPrimitiveArray(data);
        showStatus('tbl-status', `✓ Rendered ${data.length} row(s)`, 'success');
        return;
      }

      lastTableData = { keys: allKeys, rows: data };
      renderObjectArray(allKeys, data);
      showStatus('tbl-status', `✓ ${data.length} row(s), ${allKeys.length} column(s)`, 'success');
    }

    function renderObjectArray(keys, rows) {
      const headers = `<tr><th>#</th>${keys.map(k => `<th>${escHtml(k)}</th>`).join('')}</tr>`;
      const bodyRows = rows.map((row, i) => {
        const cells = keys.map(k => {
          const val = (row && typeof row === 'object') ? row[k] : undefined;
          return `<td>${val === undefined || val === null ? '<span style="color:var(--muted)">—</span>' : escHtml(typeof val === 'object' ? JSON.stringify(val) : String(val))}</td>`;
        }).join('');
        return `<tr><td>${i + 1}</td>${cells}</tr>`;
      }).join('');

      document.getElementById('tbl-result').innerHTML =
        `<table class="array-table"><thead>${headers}</thead><tbody>${bodyRows}</tbody></table>`;
    }

    function renderPrimitiveArray(data) {
      const rows = data.map((v, i) =>
        `<tr><td>${i + 1}</td><td>${escHtml(String(v))}</td></tr>`).join('');
      document.getElementById('tbl-result').innerHTML =
        `<table class="array-table">
          <thead><tr><th>#</th><th>Value</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    // ── CSV Export ───────────────────────────────────────────
    function exportTableCSV() {
      if (!lastTableData) { showStatus('tbl-status','Generate the table first','error'); return; }
      const { keys, rows } = lastTableData;
      const esc = v => `"${String(v === null || v === undefined ? '' : typeof v === 'object' ? JSON.stringify(v) : v).replace(/"/g,'""')}"`;
      const csv = [
        keys.map(esc).join(','),
        ...rows.map(row => keys.map(k => esc(row?.[k])).join(','))
      ].join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url  = URL.createObjectURL(blob);
      const a    = Object.assign(document.createElement('a'), { href: url, download: 'export.csv' });
      a.click();
      URL.revokeObjectURL(url);
    }

    // ── XSS prevention ──────────────────────────────────────
    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
    }

    // ── Keyboard shortcuts ───────────────────────────────────
    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        const active = document.querySelector('.panel.active');
        if (!active) return;
        const actions = {
          'tab-format':  doFormat,
          'tab-compare': doCompare,
          'tab-search':  doSearch,
          'tab-extract': doExtract,
          'tab-table':   doTable,
        };
        if (actions[active.id]) actions[active.id]();
      }
    });
</script>
</body>
</html>
